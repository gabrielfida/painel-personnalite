function indicatorByKey(k){ return INDICATORS.find(i=>i.key===k); }
function fmtMoney(v){ v = Number(v)||0; return v.toLocaleString('pt-BR',{style:'currency',currency:'BRL'}); }
function fmtNum(v){ v = Number(v)||0; return v.toLocaleString('pt-BR',{maximumFractionDigits:2}); }
function fmtVal(v,unit){ return unit==='R$' ? fmtMoney(v) : fmtNum(v); }
// Parses a Brazilian-formatted number string ("1.234,56" or "1234,56" or "-1234,56") into a JS Number
function parseBRNumber(str){
  if(str === undefined || str === null || str === '') return 0;
  str = String(str).trim();
  if(str==='') return 0;
  const negative = str.startsWith('-');
  str = str.replace(/^-/,'').replace(/[^0-9.,]/g,'');
  str = str.replace(/\./g,'').replace(',', '.');
  let num = parseFloat(str);
  if(isNaN(num)) num = 0;
  return negative ? -Math.abs(num) : num;
}
// Formats a Number as Brazilian currency-style text (1.234,56) without the R$ symbol, for use inside inputs
function formatBRCurrencyInput(num){
  num = Number(num)||0;
  return num.toLocaleString('pt-BR', { minimumFractionDigits:2, maximumFractionDigits:2 });
}
function onCurrencyFocus(el){
  const num = parseBRNumber(el.value);
  el.value = num === 0 ? '' : String(num).replace('.', ',');
}
function onCurrencyBlur(el){
  if(el.value.trim()==='') return;
  el.value = formatBRCurrencyInput(parseBRNumber(el.value));
}
function currencyInputHTML(id, value){
  const shown = (value===''||value===undefined||value===null) ? '' : formatBRCurrencyInput(value);
  return `<input type="text" inputmode="decimal" id="${id}" value="${shown}" placeholder="0,00" onfocus="onCurrencyFocus(this)" onblur="onCurrencyBlur(this)">`;
}
function todayStr(){ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function nowIso(){ return new Date().toISOString(); }

/* ======================================================================
   TOASTS
====================================================================== */
function toast(msg, type){
  type = type || 'navy';
  const colors = { navy:'#0B2447', amber:'#9A6B00', green:'#1E7A46', red:'#B3261E' };
  const el = document.createElement('div');
  el.className = 'toast';
  el.style.background = colors[type] || colors.navy;
  el.textContent = msg;
  document.getElementById('toast-wrap').appendChild(el);
  setTimeout(()=>{ el.style.opacity='0'; el.style.transition='opacity .3s'; setTimeout(()=>el.remove(),300); }, 3200);
}

/* ======================================================================
   GLOBAL ERROR SAFETY NET — surfaces any uncaught error as a toast,
   instead of failing silently
====================================================================== */
window.addEventListener('error', (e)=>{
  console.error(e.error || e.message);
  try{ toast('Erro inesperado: ' + (e.message || 'veja o console (F12)'), 'red'); }catch(_e){}
});
window.addEventListener('unhandledrejection', (e)=>{
  const reason = e.reason;
  console.error(reason);
  const msg = (reason && reason.message) ? reason.message : String(reason);
  try{ toast('Erro inesperado: ' + msg, 'red'); }catch(_e){}
});

    sb.from('producao').select('*'),
  ]);
  CARTEIRAS = (carteirasRows || []).map(r=>r.numero);
  DB.metas = (metasRows || []).map(r=>({ ...r, dataCadastro:r.data_cadastro, cadastradoPor:r.cadastrado_por }));
  DB.producao = (producaoRows || []).map(r=>({ ...r, atualizadoEm:r.atualizado_em, atualizadoPor:r.atualizado_por }));
  if(session && session.perfil === 'gerente'){
    const { data: profileRows } = await sb.from('profiles').select('*').order('usuario');
    DB.profiles = profileRows || [];
  } else if(session){
    const { data: ownProfile } = await sb.from('profiles').select('*').eq('id', session.id).single();
    DB.profiles = ownProfile ? [ownProfile] : [];
  }
}

function subscribeRealtime(){
  if(realtimeChannel) sb.removeChannel(realtimeChannel);
  realtimeChannel = sb.channel('ag2492-changes')
    .on('postgres_changes', { event:'*', schema:'public', table:'metas' }, ()=>{ loadAllData().then(renderCurrentView); })
    .on('postgres_changes', { event:'*', schema:'public', table:'producao' }, ()=>{ loadAllData().then(renderCurrentView); })
    .on('postgres_changes', { event:'*', schema:'public', table:'carteiras' }, ()=>{ loadAllData().then(renderCurrentView); })
    .subscribe();
}

====================================================================== */
async function handleLogin(evt){
  evt.preventDefault();
  const usuario = document.getElementById('login-user').value.trim();
  const senha = document.getElementById('login-pass').value;
  const errBox = document.getElementById('login-error');
  const submitBtn = evt.target.querySelector('button[type=submit]');
  errBox.classList.add('hidden');
  submitBtn.disabled = true; submitBtn.textContent = 'Entrando...';

  const { data, error } = await sb.auth.signInWithPassword({ email: emailFor(usuario), password: senha });
  if(error || !data.user){
    errBox.textContent = 'Usuário ou senha incorretos.';
    errBox.classList.remove('hidden');
    submitBtn.disabled = false; submitBtn.textContent = 'Entrar';
    return false;
  }

  const { data: profile, error: profErr } = await sb.from('profiles').select('*').eq('id', data.user.id).single();
  if(profErr || !profile){
    errBox.textContent = 'Login feito, mas não encontramos seu perfil. Fale com o gerente geral.';
    errBox.classList.remove('hidden');
    submitBtn.disabled = false; submitBtn.textContent = 'Entrar';
    await sb.auth.signOut();
    return false;
  }

  session = { id:profile.id, usuario:profile.usuario, nome:profile.nome, perfil:profile.perfil, carteira:profile.carteira };
  submitBtn.disabled = false; submitBtn.textContent = 'Entrar';
  await afterLogin(profile.precisa_trocar_senha);
  return false;
}

async function afterLogin(precisaTrocarSenha){
  document.getElementById('screen-login').classList.add('hidden');
  document.getElementById('screen-app').classList.remove('hidden');
  document.getElementById('topbar-username').textContent = session.nome + (session.perfil==='gerente' ? ' · Gerente' : ' · Cart. '+session.carteira);
  buildNav();
  await loadAllData();
  subscribeRealtime();
  updateSyncBadge();
  navigateTo(precisaTrocarSenha ? 'conta' : 'dashboard');
  if(precisaTrocarSenha) toast('Por segurança, defina uma nova senha antes de continuar.', 'amber');
}

async function doLogout(){
  if(realtimeChannel){ sb.removeChannel(realtimeChannel); realtimeChannel = null; }
  await sb.auth.signOut();
  session = null;
  document.getElementById('screen-app').classList.add('hidden');
  document.getElementById('screen-login').classList.remove('hidden');
  document.getElementById('login-form').reset();
}

async function tryRestoreSession(){
  const { data } = await sb.auth.getSession();
  if(!data.session) return;
  const { data: profile } = await sb.from('profiles').select('*').eq('id', data.session.user.id).single();
  if(!profile) return;
  session = { id:profile.id, usuario:profile.usuario, nome:profile.nome, perfil:profile.perfil, carteira:profile.carteira };
  await afterLogin(profile.precisa_trocar_senha);
}

/* ======================================================================
   DATA HELPERS
====================================================================== */
function scopeCarteiras(){
  return session.perfil === 'gerente' ? CARTEIRAS : [Number(session.carteira)];
}
function getProducaoRow(carteira, indKey, sub, data){
  return DB.producao.find(r => String(r.carteira)===String(carteira) && r.indicador===indKey && (r.sub||'')===(sub||'') && r.data===data);
}
function latestValue(carteira, indKey, sub){
  const rows = DB.producao.filter(r=> String(r.carteira)===String(carteira) && r.indicador===indKey && (r.sub||'')===(sub||'')).sort((a,b)=> a.data<b.data?1:-1);
  return rows.length ? Number(rows[0].valor)||0 : 0;
}
function valueOnOrBefore(carteira, indKey, sub, dateStr){
  const rows = DB.producao.filter(r=> String(r.carteira)===String(carteira) && r.indicador===indKey && (r.sub||'')===(sub||'') && r.data<=dateStr).sort((a,b)=> a.data<b.data?1:-1);
  return rows.length ? Number(rows[0].valor)||0 : 0;
}
function getMeta(carteira, indKey, sub){
  sub = sub || '';
  const row = DB.metas.find(r=> String(r.carteira)===String(carteira) && r.indicador===indKey && (r.sub||'')===sub);
  return row ? row : null;
}
// Whole-indicator meta total: sums sub-item metas when the indicator has them (ex: Conquista = Migração + Conta Mercado)
function indicatorMetaTotal(carteira, indKey){
  const ind = indicatorByKey(indKey);
  if(ind && ind.hasSub){
    return ind.subItems.reduce((s,si)=>{ const m = getMeta(carteira, indKey, si.key); return s + (m? Number(m.valor)||0 : 0); }, 0);
  }
  const m = getMeta(carteira, indKey, '');
  return m ? Number(m.valor)||0 : 0;
}
// Whole-indicator current value: sums sub-items when the indicator has them (ex: Conquista = Migração + Conta Mercado)
function currentIndicatorValue(carteira, indKey){
  const ind = indicatorByKey(indKey);
  if(ind && ind.hasSub){ return ind.subItems.reduce((s,si)=> s + latestValue(carteira, indKey, si.key), 0); }
  return latestValue(carteira, indKey, '');
}
function indicatorValueOnOrBefore(carteira, indKey, dateStr){
  const ind = indicatorByKey(indKey);
  if(ind && ind.hasSub){ return ind.subItems.reduce((s,si)=> s + valueOnOrBefore(carteira, indKey, si.key, dateStr), 0); }
  return valueOnOrBefore(carteira, indKey, '', dateStr);
}
function totalIndicatorToday(indKey){
  return scopeCarteiras().reduce((sum,c)=> sum + currentIndicatorValue(c, indKey), 0);
}
function totalMeta(indKey){
  return scopeCarteiras().reduce((sum,c)=> sum + indicatorMetaTotal(c, indKey), 0);
}
function pctAtingido(indKey){
  const meta = totalMeta(indKey);
  const atual = totalIndicatorToday(indKey);
  if(!meta) return 0;
  return Math.round((atual/meta)*1000)/10;
}
function pctTextColor(pct){
  if(pct>=100) return 'color:#1E7A46';
  if(pct>=60) return 'color:#8A6D0B';
  return 'color:#B3261E';
}
function agencySummaryRowsHTML(){
  return INDICATORS.map(ind=>{
    const metaTotal = totalMeta(ind.key);
    const atual = totalIndicatorToday(ind.key);
    const pct = metaTotal ? Math.round((atual/metaTotal)*1000)/10 : null;
    return `<tr class="row-hover border-t border-slate-100 dark:border-slate-800">
      <td class="p-2">${ind.label}</td>
      <td class="p-2 text-right">${metaTotal ? fmtVal(metaTotal, ind.unit) : '—'}</td>
      <td class="p-2 text-right">${fmtVal(atual, ind.unit)}</td>
      <td class="p-2 text-right font-semibold" style="${pct===null?'':pctTextColor(pct)}">${pct===null?'sem meta':pct+'%'}</td>
    </tr>`;
  }).join('');
}

function exportDashboardPDF(){
  const el = document.getElementById('print-area');

  html2canvas(el, { backgroundColor: document.documentElement.classList.contains('dark') ? '#0B1220' : '#F3F5F8', scale:2 }).then(canvas=>{
    const { jsPDF } = window.jspdf;
    const imgData = canvas.toDataURL('image/png');
    const pdf = new jsPDF('p','mm','a4');
    const pageW = pdf.internal.pageSize.getWidth();
    const imgH = canvas.height * pageW / canvas.width;
    let heightLeft = imgH, position = 0;
    pdf.addImage(imgData,'PNG',0,position,pageW,imgH);
    heightLeft -= pdf.internal.pageSize.getHeight();
    while(heightLeft > 0){
      position = heightLeft - imgH;
      pdf.addPage();
      pdf.addImage(imgData,'PNG',0,position,pageW,imgH);
      heightLeft -= pdf.internal.pageSize.getHeight();
    }
    pdf.save('Dashboard_AGPersonnalite_'+todayStr()+'.pdf');
  });
}

async function saveAllMetas(){

    if(ind.hasSub){
      ind.subItems.forEach(s=>{
        const el = document.getElementById('meta-'+ind.key+'-'+s.key);

        rows.push({ carteira, indicador:ind.key, sub:s.key, valor:Number(el.value), data_cadastro:todayStr(), cadastrado_por:session.nome });

function onTableFilterChange(){
  tableFilters.carteiras = Array.from(document.getElementById('tf-carteiras').selectedOptions).map(o=>o.value);
  tableFilters.indicadores = Array.from(document.getElementById('tf-indicadores').selectedOptions).map(o=>o.value);
  tableFilters.de = document.getElementById('tf-de').value;
  tableFilters.ate = document.getElementById('tf-ate').value;
  tableFilters.busca = document.getElementById('tf-busca').value.toLowerCase();
  tablePage = 1;
  renderTabelaBody();
}
function sortTable(col){
  if(tableSort.col===col) tableSort.dir = tableSort.dir==='asc'?'desc':'asc'; else { tableSort.col=col; tableSort.dir='asc'; }
  renderTabelaBody();
}
function filteredProducao(){
  const allowedCarteiras = session.perfil==='gerente' ? CARTEIRAS.map(String) : [String(session.carteira)];
  return DB.producao.filter(r=>{
    if(!allowedCarteiras.includes(String(r.carteira))) return false;
    if(tableFilters.carteiras.length && !tableFilters.carteiras.includes(String(r.carteira))) return false;
    if(tableFilters.indicadores.length && !tableFilters.indicadores.includes(r.indicador)) return false;
    if(tableFilters.de && r.data < tableFilters.de) return false;
    if(tableFilters.ate && r.data > tableFilters.ate) return false;
    if(tableFilters.busca){
      const ind = indicatorByKey(r.indicador);
      const hay = [r.data, r.carteira, ind?ind.label:r.indicador, r.sub, r.valor, r.atualizadoPor].join(' ').toLowerCase();
      if(!hay.includes(tableFilters.busca)) return false;
    }
    return true;
  });
}
function renderTabelaBody(){
  let rows = filteredProducao();
  rows.sort((a,b)=>{
    let va=a[tableSort.col], vb=b[tableSort.col];
    if(tableSort.col==='valor'){ va=Number(va); vb=Number(vb); }
    if(va<vb) return tableSort.dir==='asc'?-1:1;
    if(va>vb) return tableSort.dir==='asc'?1:-1;
    return 0;
  });
  const totalPages = Math.max(1, Math.ceil(rows.length / tablePageSize));
  tablePage = Math.min(tablePage, totalPages);
  const start = (tablePage-1)*tablePageSize;
  const pageRows = rows.slice(start, start+tablePageSize);

  document.getElementById('table-body').innerHTML = pageRows.map(r=>{
    const ind = indicatorByKey(r.indicador);
    const subLabel = r.sub && ind && ind.subItems ? (ind.subItems.find(s=>s.key===r.sub)||{}).label : '—';
    return `<tr class="row-hover border-t border-slate-100 dark:border-slate-800">
      <td class="p-2">${fmtDateBR(r.data)}</td>
      <td class="p-2">Carteira ${r.carteira}</td>
      <td class="p-2">${ind?ind.label:r.indicador}</td>
      <td class="p-2">${subLabel||'—'}</td>

      <td class="p-2">${r.atualizadoPor||'—'}</td>
      <td class="p-2">${r.atualizadoEm ? new Date(r.atualizadoEm).toLocaleString('pt-BR') : '—'}</td>
    </tr>`;
  }).join('') || `<tr><td colspan="7" class="p-6 text-center text-slate-400">Nenhum registro encontrado para os filtros aplicados.</td></tr>`;

  document.getElementById('table-pagination').innerHTML = `
    <div>Mostrando ${rows.length? start+1:0}–${Math.min(start+tablePageSize, rows.length)} de ${rows.length} registros</div>
    <div class="flex items-center gap-2">
      <select onchange="changePageSize(this.value)" class="!w-auto !py-1">
        <option value="15" ${tablePageSize===15?'selected':''}>15/página</option>
        <option value="25" ${tablePageSize===25?'selected':''}>25/página</option>
        <option value="50" ${tablePageSize===50?'selected':''}>50/página</option>
        <option value="100" ${tablePageSize===100?'selected':''}>100/página</option>
      </select>
      <button onclick="changePage(-1)" class="px-2 py-1 rounded bg-slate-200 dark:bg-slate-700">‹</button>
      <span>${tablePage} / ${totalPages}</span>
      <button onclick="changePage(1)" class="px-2 py-1 rounded bg-slate-200 dark:bg-slate-700">›</button>
    </div>`;
}
function changePage(delta){ tablePage += delta; renderTabelaBody(); }
function changePageSize(v){ tablePageSize = Number(v); tablePage = 1; renderTabelaBody(); }

function exportTableExcel(){
  const rows = filteredProducao().map(r=>{
    const ind = indicatorByKey(r.indicador);
    return { Data:fmtDateBR(r.data), Carteira:r.carteira, Indicador: ind?ind.label:r.indicador, SubItem:r.sub||'', Valor:r.valor, AtualizadoPor:r.atualizadoPor, AtualizadoEm:r.atualizadoEm };
  });
  const ws = XLSX.utils.json_to_sheet(rows);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Producao');
  XLSX.writeFile(wb, 'Producao_AGPersonnalite_'+todayStr()+'.xlsx');
}
function exportTablePDF(){
  const table = document.querySelector('#view-root table');
  toast('Gerando PDF da tabela...', 'navy');
  html2canvas(table, { backgroundColor: document.documentElement.classList.contains('dark') ? '#111B30' : '#fff', scale:2 }).then(canvas=>{
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF('l','mm','a4');
    const pageW = pdf.internal.pageSize.getWidth();
    const imgH = canvas.height * pageW / canvas.width;
    pdf.addImage(canvas.toDataURL('image/png'),'PNG',0,0,pageW,imgH);
    pdf.save('Tabela_Producao_AGPersonnalite_'+todayStr()+'.pdf');
  });
}

function toggleNewCarteira(){
  document.getElementById('new-carteira-wrap').style.display = document.getElementById('new-perfil').value==='gerente' ? 'none' : 'block';
}
async function createUser(){
  const nome = document.getElementById('new-nome').value.trim();
  const usuario = document.getElementById('new-usuario').value.trim();
  const senha = document.getElementById('new-senha').value;
  const perfil = document.getElementById('new-perfil').value;
  const carteira = perfil==='gerente' ? null : Number(document.getElementById('new-carteira').value);
  if(!nome || !usuario || !senha){ toast('Preencha todos os campos.', 'red'); return; }
  if(DB.profiles.some(u=>String(u.usuario).toLowerCase()===usuario.toLowerCase())){ toast('Já existe um usuário com esse login.', 'red'); return; }
  const { data, error } = await sb.functions.invoke('admin-usuarios', { body: { action:'create_user', usuario, senha, nome, perfil, carteira } });
  if(error || (data && data.error)){ toast('Erro: ' + (data?.error || error.message), 'red'); return; }
  await loadAllData();
  toast('Usuário cadastrado com sucesso.', 'green');
  renderAdmin();
}
let editingUserId = null;
function startEditUser(usuario){ editingUserId = usuario; renderAdminUsersTable(); }
function cancelEditUser(){ editingUserId = null; renderAdminUsersTable(); }
function renderAdminUsersTable(){
  document.getElementById('admin-users-table').innerHTML = DB.profiles.map(u=>{
    if(editingUserId === u.usuario){
      return `<tr class="border-t border-slate-100 dark:border-slate-800" style="background:rgba(30,95,217,0.06)">
        <td class="p-2"><input type="text" id="edit-nome-${u.usuario}" value="${u.nome}" class="!py-1"></td>
        <td class="p-2 text-slate-400">${u.usuario}</td>
        <td class="p-2">
          <select id="edit-perfil-${u.usuario}" class="!py-1">
            <option value="colaborador" ${u.perfil==='colaborador'?'selected':''}>Colaborador</option>
            <option value="gerente" ${u.perfil==='gerente'?'selected':''}>Gerente Geral</option>
          </select>
        </td>
        <td class="p-2">
          <select id="edit-carteira-${u.usuario}" class="!py-1">
            ${CARTEIRAS.map(c=>`<option value="${c}" ${Number(u.carteira)===c?'selected':''}>Carteira ${c}</option>`).join('')}
          </select>
        </td>
        <td class="p-2 flex gap-2 flex-wrap">
          <button onclick="saveEditUser('${u.usuario}')" class="px-2 py-1 rounded btn-accent text-[11px] font-semibold">Salvar</button>
          <button onclick="cancelEditUser()" class="px-2 py-1 rounded bg-slate-200 dark:bg-slate-700 text-[11px]">Cancelar</button>
        </td>
      </tr>`;
    }
    return `<tr class="row-hover border-t border-slate-100 dark:border-slate-800">
      <td class="p-2">${u.nome}</td>
      <td class="p-2">${u.usuario}</td>
      <td class="p-2"><span class="badge" style="background:${u.perfil==='gerente'?'#DCE9FB':'#EAF1F8'};color:${u.perfil==='gerente'?'#0F355F':'#2E5A8F'}">${u.perfil}</span></td>
      <td class="p-2">${u.carteira || '—'}</td>
      <td class="p-2 flex gap-2 flex-wrap">
        <button onclick="startEditUser('${u.usuario}')" class="px-2 py-1 rounded bg-slate-200 dark:bg-slate-700 text-[11px]">Editar</button>
        <button onclick="resetPassword('${u.usuario}')" class="px-2 py-1 rounded bg-slate-200 dark:bg-slate-700 text-[11px]">Resetar senha</button>
        <button onclick="deleteUser('${u.usuario}')" class="px-2 py-1 rounded bg-red-100 dark:bg-red-900/30 text-red-700 dark:text-red-300 text-[11px] font-semibold">Excluir</button>
      </td>
    </tr>`;
  }).join('');
}
async function saveEditUser(usuario){
  const u = DB.profiles.find(x=>x.usuario===usuario);
  const nome = document.getElementById('edit-nome-'+usuario).value.trim();
  const perfil = document.getElementById('edit-perfil-'+usuario).value;
  const carteira = perfil==='gerente' ? null : Number(document.getElementById('edit-carteira-'+usuario).value);
  if(!nome){ toast('Informe o nome.', 'red'); return; }
  if(u.perfil==='gerente' && perfil!=='gerente' && DB.profiles.filter(x=>x.perfil==='gerente').length<=1){
    toast('Não é possível rebaixar o único usuário gerente geral.', 'red'); return;
  }
  const { error } = await sb.from('profiles').update({ nome, perfil, carteira, atualizado_em: nowIso() }).eq('usuario', usuario);
  if(error){ toast('Erro ao atualizar: ' + error.message, 'red'); return; }
  editingUserId = null;
  await loadAllData();
  toast('Usuário atualizado com sucesso.', 'green');
  renderAdmin();
}
async function deleteUser(usuario){
  if(usuario === session.usuario){ toast('Você não pode excluir o usuário com o qual está logado.', 'red'); return; }
  const u = DB.profiles.find(x=>x.usuario===usuario);
  if(!u) return;
  if(u.perfil==='gerente' && DB.profiles.filter(x=>x.perfil==='gerente').length<=1){
    toast('Não é possível excluir o único usuário gerente geral.', 'red'); return;
  }
  if(!confirm('Excluir o usuário "'+usuario+'" ('+u.nome+')? Esta ação não pode ser desfeita.')) return;
  const { data, error } = await sb.functions.invoke('admin-usuarios', { body: { action:'delete_user', usuario } });
  if(error || (data && data.error)){ toast('Erro: ' + (data?.error || error.message), 'red'); return; }
  await loadAllData();
  toast('Usuário excluído.', 'green');
  renderAdmin();
}
async function resetPassword(usuario){
  const nova = prompt('Nova senha temporária para "'+usuario+'":', 'mudar123');
  if(nova===null) return;
  const { data, error } = await sb.functions.invoke('admin-usuarios', { body: { action:'reset_password', usuario, nova_senha: nova } });
  if(error || (data && data.error)){ toast('Erro: ' + (data?.error || error.message), 'red'); return; }
  toast('Senha redefinida para '+usuario+'.', 'green');
}
function downloadBackup(){
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(DB.profiles.map(u=>({usuario:u.usuario, nome:u.nome, perfil:u.perfil, carteira:u.carteira}))), 'Usuarios');
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(DB.metas), 'Metas');
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(DB.producao), 'Producao');
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(CARTEIRAS.map(c=>({numero:c}))), 'Carteiras');
  XLSX.writeFile(wb, 'Backup_AGPersonnalite_'+todayStr()+'.xlsx');
}
async function addCarteira(){
  const el = document.getElementById('new-carteira-numero');
  const num = Number(el.value);
  if(!num || num<=0){ toast('Informe um número de carteira válido.', 'red'); return; }
  if(CARTEIRAS.includes(num)){ toast('Essa carteira já existe.', 'red'); return; }
  const { error } = await sb.from('carteiras').insert({ numero: num });
  if(error){ toast('Erro ao incluir carteira: ' + error.message, 'red'); return; }
  await loadAllData();
  toast('Carteira '+num+' incluída com sucesso.', 'green');
  el.value = '';
  renderAdmin();
}

function renderConta(){
  const root = document.getElementById('view-root');
  root.innerHTML = `
  <div class="fade-in max-w-md">
    <h1 class="text-xl font-bold text-navy dark:text-white accent-underline inline-block mb-5">Minha Conta</h1>
    <div class="card p-5">
      <div class="mb-4">
        <div class="text-[12px] text-slate-400">Usuário</div>
        <div class="font-semibold text-navy dark:text-white">${session.nome} (${session.usuario})</div>
      </div>
      <label>Nova senha</label>
      <input type="password" id="conta-senha-nova" placeholder="Nova senha">
      <label class="block mt-3">Confirmar nova senha</label>
      <input type="password" id="conta-senha-confirma" placeholder="Confirme a nova senha">
      <div id="conta-debug" class="text-[11px] text-slate-400 mt-2"></div>
      <button onclick="changePassword()" id="btn-salvar-senha" class="w-full py-2.5 rounded-lg btn-accent font-bold mt-4">Salvar nova senha</button>
    </div>
  </div>`;
}
async function changePassword(){
  const nova = document.getElementById('conta-senha-nova').value;
  const confirma = document.getElementById('conta-senha-confirma').value;
  const debugBox = document.getElementById('conta-debug');
  if(!nova || nova.length < 4){ toast('A nova senha deve ter pelo menos 4 caracteres.', 'red'); return; }
  if(nova !== confirma){ toast('As senhas não coincidem.', 'red'); return; }
  const btn = document.getElementById('btn-salvar-senha');
  if(btn){ btn.disabled = true; btn.textContent = 'Salvando...'; }
  if(debugBox) debugBox.textContent = 'Enviando...';
  try{
    const { error } = await sb.auth.updateUser({ password: nova });
    if(error){ toast('Erro ao trocar senha: ' + error.message, 'red'); if(debugBox) debugBox.textContent = 'Erro: ' + error.message; return; }
    const { error: profErr } = await sb.from('profiles').update({ precisa_trocar_senha:false, atualizado_em: nowIso() }).eq('id', session.id);
    if(profErr){ toast('Senha trocada, mas houve um erro ao atualizar o perfil: ' + profErr.message, 'amber'); }
    else { toast('Senha alterada com sucesso!', 'green'); }
    if(debugBox) debugBox.textContent = 'Concluído.';
    setTimeout(()=> navigateTo('dashboard'), 900);
  }catch(e){
    console.error(e);
    const msg = (e && e.message) ? e.message : String(e);
    toast('Erro inesperado ao trocar senha: ' + msg, 'red');
    if(debugBox) debugBox.textContent = 'Erro inesperado: ' + msg;
  }finally{
    if(btn){ btn.disabled = false; btn.textContent = 'Salvar nova senha'; }
  }
}
